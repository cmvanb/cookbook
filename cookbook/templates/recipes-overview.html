<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cookbook</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href='/static/pico.css' />
</head>
<body>
    <main class="container">
        <hgroup>
            <h1>Recipes Overview</h1>
            <h2>All your recipes in one place.</h2>
        </hgroup>
        <input type="search" id="search" name="search" placeholder="Search">
        <ul>
            {% for item in seq %}
                <article>
                    Recipe #{{item}}
                </article>
            {%- endfor %}
        </ul>
    </main>
    <footer>
        <p>Copyright (c) 2022 yo</p>
    </footer>
</body>
</html>
